<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNIV - Sistema Nacional de Inteligencia Vial</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body, html { margin: 0; height: 100%; background: #03060f; color: white; font-family: sans-serif; }
        .screen-portal {
            position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(3,6,15,0.9), rgba(3,6,15,0.9)), url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1920');
            background-size: cover; padding: 20px; text-align: center;
        }
        .container { background: rgba(7,12,30,0.9); padding: 40px; border-radius: 25px; border: 1px solid #00f2fe; max-width: 450px; }
        .badge { background: #ff3b3026; color: #ff3b30; padding: 5px 15px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .btn { margin-top: 25px; width: 100%; padding: 15px; background: #00f2fe; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #map { height: 100%; display: none; }
    </style>
</head>
<body>
    <div id="portal" class="screen-portal">
        <div class="container">
            <div class="badge">Este es un modelo de prueba: esta app actualmente se encuentra en desarrollo</div>
            <h1 style="margin: 20px 0;">SNIV</h1>
            <p>Sistema Nacional de Inteligencia Vial<br>Radar Social RD</p>
            <button class="btn" onclick="entrar()">ACCEDER AL SISTEMA</button>
        </div>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        function entrar() {
            document.getElementById('portal').style.display = 'none';
            document.getElementById('map').style.display = 'block';
            const map = L.map('map').setView([18.486, -69.931], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }
    </script>
</body>
</html>
