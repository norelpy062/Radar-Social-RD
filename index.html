<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNIV | Centro de Inteligencia Vial</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
    <style>
        :root {
            --bg-pure: #03060f;
            --glass-bg: rgba(7, 12, 30, 0.85);
            --glass-border: rgba(0, 242, 254, 0.2);
            --neon-blue: #00f2fe;
            --neon-cyan: #4facfe;
            --neon-red: #ff3b30;
            --neon-yellow: #ffcc00;
        }

        body, html { width: 100%; height: 100%; margin: 0; background: var(--bg-pure); color: #fff; font-family: 'Lexend', sans-serif; overflow: hidden; }

        /* FONDOS FUTURISTAS */
        .tech-bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(circle at 50% 50%, rgba(0, 242, 254, 0.05) 0%, #03060f 100%); }
        .radar-effect { position: absolute; width: 100vw; height: 100vh; pointer-events: none; background-image: radial-gradient(circle at center, rgba(0,242,254,0.05) 0%, transparent 70%); }

        /* PANTALLA INICIO */
        .screen-portal { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); }
        .portal-card { width: 90%; max-width: 450px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 28px; padding: 40px; text-align: center; backdrop-filter: blur(25px); box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        
        .alert-badge { 
            display: inline-block; padding: 10px 20px; background: rgba(255, 204, 0, 0.1); 
            border: 1px solid var(--neon-yellow); color: var(--neon-yellow); 
            border-radius: 50px; font-size: 11px; font-weight: 700; margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
        }

        .btn-apple { 
            width: 100%; padding: 18px; border: none; border-radius: 16px; 
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan)); 
            color: #03060f; font-weight: 800; cursor: pointer; transition: all 0.3s;
        }
        .btn-apple:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* DASHBOARD PRINCIPAL */
        #main-dashboard { display: none; width: 100%; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; z-index: 1; }
        
        /* BARRA SUPERIOR */
        .top-nav { position: absolute; top: 0; width: 100%; z-index: 1000; padding: 20px; display: flex; justify-content: space-between; background: linear-gradient(to bottom, rgba(3,6,15,0.9), transparent); }
    </style>
</head>
<body>

    <div class="tech-bg"><div class="radar-effect"></div></div>

    <div id="portal-screen" class="screen-portal">
        <div class="portal-card">
            <div class="alert-badge">⚠️ MODELO DE PRUEBA • ESTA APP SE ENCUENTRA EN DESARROLLO</div>
            <h1 style="font-family: 'Space Grotesk'; font-size: 28px; margin-bottom: 10px;">SNIV</h1>
            <p style="color: #7e8da8; margin-bottom: 30px;">Sistema Nacional de Inteligencia Vial</p>
            <button class="btn-apple" onclick="entrar()">Acceder al Centro de Control</button>
        </div>
    </div>

    <div id="main-dashboard">
        <div class="top-nav">
            <div style="font-weight: 700; color: var(--neon-blue);">🛰️ Sistema Nacional de Inteligencia Vial</div>
            <div id="time-display" style="font-size: 12px;">🟢 Operativo</div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

    <script>
        var map;
        const centerRD = [18.8500, -70.7000];
        
        // --- TU LÓGICA ORIGINAL INTEGRADA ---
        function entrar() {
            document.getElementById('portal-screen').style.display = 'none';
            document.getElementById('main-dashboard').style.display = 'block';
            initMap();
        }

        function initMap() {
            map = L.map('map', { center: centerRD, zoom: 8, zoomControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            // Aquí puedes llamar a tus funciones originales de datos
            console.log("Sistema SNIV Inicializado...");
        }

        // --- PREPARACIÓN PARA TRÁFICO (SOLICITADO) ---
        const trafficLayer = L.layerGroup();
        trafficLayer.addTo(map || {}); // Se activará al iniciar
        
        function actualizarTraficoTiempoReal() {
            console.log("Esperando API de tráfico...");
        }

        // Actualizar hora
        setInterval(() => {
            document.getElementById('time-display').innerText = "🟢 Operativo | " + new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
